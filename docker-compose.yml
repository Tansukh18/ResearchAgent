services:
  backend:
    build: ./backend
    container_name: research-agent-backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: research-agent-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
